<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered interview practice and online testing platform" />
    <title>Interview Lab — Start Your Test</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128218;</text></svg>" />
  </head>
  <body>
    <header class="topbar">
      <a href="welcome.html" class="topbar__brand">Interview Lab</a>
      <span class="topbar__meta">Student Portal</span>
    </header>

    <main class="main">
      <div class="wrap">
        <div class="card">
          <div class="card__lead">
            <div class="card__icon" aria-hidden="true">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
              </svg>
            </div>
            <div>
              <h1>AI Interview Practice</h1>
              <p class="sub">
                Enter your details, select a topic, and take a timed multiple-choice assessment.
              </p>
            </div>
          </div>

          <form id="login-form">
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              autocomplete="name"
              required
              placeholder="Enter your full name"
            />

            <label for="regNo">Register Number</label>
            <input
              type="text"
              id="regNo"
              name="regNo"
              required
              placeholder="Enter your register number"
            />

            <label for="category">Select Category</label>
            <select id="category" name="category" required>
              <option value="HTML">HTML</option>
              <option value="CSS">CSS</option>
              <option value="JavaScript">JavaScript</option>
              <option value="Aptitude">Aptitude</option>
            </select>

            <button type="submit" class="btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              Start Test
            </button>
          </form>

          <div class="nav-links">
            <a class="link-quiet" href="welcome.html">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
              </svg>
              Back to Welcome
            </a>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      AI-powered interview practice &amp; online assessment system
    </footer>

    <script src="js/login.js"></script>
  </body>
</html>
